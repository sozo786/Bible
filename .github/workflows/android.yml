name: Android CI - Noor-e-Kalaam App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Delete corrupt Gradle Wrapper JAR
        run: rm -rf gradle/wrapper/gradle-wrapper.jar

      - name: Setup Gradle 8.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.5
          validate-wrappers: false  # <-- Ye line add karni thi

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Build Release APK
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Noor-e-Kalaam-App-Debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Noor-e-Kalaam-App-Release
          path: app/build/outputs/apk/release/app-release.apk
